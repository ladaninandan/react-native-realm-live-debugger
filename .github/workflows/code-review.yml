name: Code Quality & Review

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Smoke Integration Tests
        run: npm test

      - name: Check Code Formatting
        run: npx prettier --check "bin/**/*.js" "client/**/*.ts" "public/**/*.js" "public/**/*.css" "server.js" "test/**/*.js"
